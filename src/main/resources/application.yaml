spring:
  application:
    name: rateit-backend
  datasource:
    # Default for local host dev (overridden by SPRING_DATASOURCE_URL env var in Docker)
    url: jdbc:postgresql://localhost:5432/rateit_db
    username: rateit_user
    password: rateit_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    location: ./uploads
